<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FlowForge Workflow Dashboard</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h1>FlowForge</h1>
<p>Smart Workflow Automation Dashboard</p>

</header>


<section class="stats">

<div class="stat">
<h3>Total Tasks</h3>
<p id="totalTasks">0</p>
</div>

<div class="stat">
<h3>Completed</h3>
<p id="completedTasks">0</p>
</div>

<div class="stat">
<h3>Pending</h3>
<p id="pendingTasks">0</p>
</div>

<div class="stat">
<h3>Status</h3>
<p id="workflowStatus">Created</p>
</div>

</section>


<section class="progress-section">

<h3>Workflow Progress</h3>

<div class="progress-bar">
<div id="progressFill"></div>
</div>

</section>


<div class="dashboard">


<div class="panel controls">

<h2>Workflow Controls</h2>

<button onclick="startWorkflow()">Start Workflow</button>
<button onclick="assignTasks()">Assign Tasks</button>
<button onclick="completeTask()">Complete Next Task</button>
<button onclick="checkEscalation()">Check Escalation</button>
<button onclick="showDetails()">Show Workflow Details</button>
<button onclick="resetWorkflow()">Reset Workflow</button>

</div>


<div class="panel tasks">

<h2>Task Manager</h2>

<input type="text" id="searchBox" placeholder="Search tasks..." onkeyup="searchTask()">

<table id="taskTable">

<thead>
<tr>
<th>ID</th>
<th>Description</th>
<th>Status</th>
<th>Assigned To</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>


<div class="panel logs">

<h2>System Activity Log</h2>

<div id="log"></div>

</div>


</div>


<div id="popup" class="popup"></div>

<script src="app.js"></script>

</body>

</html>
